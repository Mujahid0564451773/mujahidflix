.search-container{

.search-container input{

}

.mode-toggle{
  display:flex;

  overflow:hidden;

}

.mode-toggle button{

.mode-toggle button.active{

.mode-toggle button:hover{

.social-icons a{

.social-icons a:nth-child(2){animation-delay:0.5s;}
.social-icons a:nth-child(3){animation-delay:1s;}

.row{

 .movie{
  width:23%;

  position: relative;

}
  .movie::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  opacity:0;
  transition:0.4s;
  border-radius:8px;
}

.movie:hover::after{
  opacity:1;
}

.movie:hover img{
  transform: scale(1.1);
}
  
.poster-box{

/* ========= CLOCK ========= */
function updateClock() {
  const now = new Date();
  const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  let hours = now.getHours();
  const minutes = String(now.getMinutes()).padStart(2,'0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12 || 12;

  const el = document.getElementById("clock");
  if (el) {
    el.innerText =
      days[now.getDay()] + " " +
      now.getDate() + " " +
      months[now.getMonth()] + " | " +
      hours + ":" + minutes + " " + ampm;
  }
}

function addCard({title, category, imageSrc, clickSrc, trailer=null}) {

  const card = document.createElement("div");
  card.className = "movie";
  card.dataset.category = category;
  card.dataset.title = title.toLowerCase();

  card.innerHTML = `
    <div class="poster-box">
      <img src="${imageSrc}" loading="lazy">
    </div>
    <div class="movie-title">${title}</div>
  `;

  const posterBox = card.querySelector(".poster-box");

  // Desktop hover trailer
  card.addEventListener("mouseenter", () => {
   if (!trailer) return;
   if (posterBox.querySelector("iframe")) return;
    
// YouTube ID automatically nikal lo
let videoId = trailer.includes("watch?v=")
  ? trailer.split("watch?v=")[1]
  : trailer.split("/embed/")[1];

videoId = videoId.split("&")[0]; // extra parameters hata do

const iframe = document.createElement("iframe");
iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0`;
iframe.className = "trailer-frame";
iframe.allow = "autoplay";
posterBox.appendChild(iframe);
  });

  card.addEventListener("mouseleave", () => {
    const iframe = posterBox.querySelector("iframe");
    if (iframe) iframe.remove();
  });

// Mobile tap trailer

  
  // Click = full movie
  card.addEventListener("click", () => {
    frame.src = clickSrc;
    modal.style.display = "flex";
  });

  row.appendChild(card);
}

 function addSeriesCard(series){

   let videoId = series.trailer.includes("watch?v=")
  ? series.trailer.split("watch?v=")[1]
  : series.trailer.split("/embed/")[1];

videoId = videoId.split("&")[0];

    const iframe = document.createElement("iframe");
    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0`;

}

  if (ytRow) ytRow.innerHTML = "";
};

let youtubeMode = false;

const API_KEY = "AIzaSyAuql0B2NuP1KvfFz6iPAAql6xQaSX5WdY";

function setYoutubeMode(on){
  youtubeMode = on;

  movieModeBtn.classList.toggle("active", !youtubeMode);
  ytModeBtn.classList.toggle("active", youtubeMode);

  if (youtubeMode) {
    searchInput.placeholder = "Search YouTube...";
    document.querySelectorAll("#movieRow .movie").forEach(m => m.style.display = "none");
  } else {
    searchInput.placeholder = "Search movies...";
    if (ytBox) ytBox.style.display = "none";
    if (ytRow) ytRow.innerHTML = "";
    filterMovies("all", document.querySelector(".filters button"));
  }
}  

movieModeBtn.addEventListener("click", () => setYoutubeMode(false));
ytModeBtn.addEventListener("click", () => setYoutubeMode(true));


let ytTimer = null;

async function searchYouTube(q){
  if (!ytBox || !ytRow) return;

  ytRow.innerHTML = "";
  ytBox.style.display = "block";

  try {
    const url =
      `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=50&safeSearch=none&q=${encodeURIComponent(q)}&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.error) {
      ytRow.innerHTML = `<div style="padding:15px;color:#ffb3b3;">YouTube API Error: ${data.error.message}</div>`;
      return;
    }

    if (!data.items || data.items.length === 0) {
      ytRow.innerHTML = `<div style="padding:15px;color:#bbb;">No results found.</div>`;
      return;
    }

    data.items.forEach(item => {
      const videoId = item.id?.videoId;
      if (!videoId) return;

      const title = item.snippet?.title || "Untitled";
      const thumb = item.snippet?.thumbnails?.medium?.url || "";

      const card = document.createElement("div");
      card.className = "movie";
      card.innerHTML = `
        <div class="poster-box"><img src="${thumb}" loading="lazy"></div>
        <div class="movie-title">${title}</div>
      `;

      card.addEventListener("click", () => {
        if (!frame || !modal) return;
        frame.src = "https://www.youtube.com/embed/" + videoId;
        modal.style.display = "flex";
      });

      ytRow.appendChild(card);
    });

  } catch (e) {
    ytRow.innerHTML = `<div style="padding:15px;color:#ffb3b3;">Network error. Check internet / API key.</div>`;
  }
}

if (searchInput) {
  searchInput.addEventListener("input", () => {
    const val = searchInput.value.trim();

    if (!youtubeMode) {
      // normal local search
      if (ytBox) ytBox.style.display = "none";
      if (ytRow) ytRow.innerHTML = "";

      document.querySelectorAll("#movieRow .movie").forEach(m => {
        m.style.display = m.dataset.title.includes(val.toLowerCase()) ? "block" : "none";
      });
      return;
    }

    // youtube mode
    if (val.length < 2) {
      if (ytBox) ytBox.style.display = "none";
      if (ytRow) ytRow.innerHTML = "";
      return;
    }

    clearTimeout(ytTimer);
    ytTimer = setTimeout(() => searchYouTube(val), 350);
  });
}

    window.addEventListener("load", () => {
  nextBtn = document.getElementById("nextEpisode");

 if(nextBtn){
    nextBtn.onclick = function(){

      let season = currentSeason;
      let episode = currentEpisode + 1;

      const seasons = currentSeries.seasons;

      if(episode >= seasons[season].episodes.length){
        season++;
        episode = 0;
      }

      if(!seasons[season]) return;

      frame.src = seasons[season].episodes[episode].video;

      nextBtn.style.display = "none";

      currentSeason = season;
      currentEpisode = episode;

    };
  }

  const audio = document.getElementById("introMusic");
      
  if(audio){
    audio.volume = 1;
    audio.play().catch(() => {
      console.log("Autoplay blocked");
    });
  }

});

  function startNextCountdown(){

let box = nextBtn;
let count = document.getElementById("count");

let seconds = 10;

box.style.display="block";
count.innerText = seconds;

let timer = setInterval(()=>{

seconds--;
count.innerText = seconds;

if(seconds <= 0){

clearInterval(timer);

let season = currentSeason;
let episode = currentEpisode + 1;

const seasons = currentSeries.seasons;

if(episode >= seasons[season].episodes.length){
season++;
episode = 0;
}

if(!seasons[season]) return;

frame.src = seasons[season].episodes[episode].video;

currentSeason = season;
currentEpisode = episode;

seconds = 10;
count.innerText = seconds;

}

},1000);

}
